; PlatformIO 配置 — KnobTone Desktop Demo 固件
[env:esp32-s3-devkitc]
platform = espressif32
board = esp32-s3-devkitc
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; 串口监视器过滤
monitor_filters = direct

lib_deps =
    ; SimpleFOC 电机控制
    https://github.com/simplefoc/Arduino-FOC.git
    ; AS5600 编码器
    https://github.com/simplefoc/Arduino-FOC-drivers.git
    ; Arduino JSON
    bblanchon/ArduinoJson @ ^7.0

build_flags =
    -D CORE_DEBUG_LEVEL=0
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=8192
